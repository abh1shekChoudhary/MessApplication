spring.application.name=MessSecond

# ── Database ──────────────────────────────────────────────────────────────────
# Values are read from environment variables when set (Docker / production).
# The fallback values after the colon are used for local development only.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/application}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:MySQL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hibernate ─────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
# dialect is auto-detected by Hibernate 6 — do not set explicitly
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# MUST be overridden in production via JWT_SECRET environment variable.
# Generate a strong key with: openssl rand -base64 32
# The default below is for local development ONLY — never use in production.
jwt.secret=${JWT_SECRET:aGVsbG8td29ybGQtdGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLW1lc3MtbWFuYWdlbWVudC1zeXN0ZW0=}